# 数据目录（驱动文件、SDIO驱动包、日志等运行时数据，通常在非系统盘，不被还原）
# 留空或不填则与脚本同目录（单目录模式）
DataDir=D:\PrinterDrivers

# 日志保留天数
LogRetainDays=30

# ─── 网络打印机（可选）───────────────────────────────────────
# 每台网络打印机一个段，段名自定（如 [NP1]、[HP_M402] 等）
# Name   = 打印机名称（显示名，也用于检查是否已安装）
# IP     = 打印机 IP 地址
# Driver = 驱动名称（需与 .inf 中注册的驱动名一致，也是 drivers\ 下的子目录名）
# Port   = 端口号（可选，默认 9100）
#
#[NP1]
#Name=HP LaserJet 1020
#IP=192.168.1.100
#Driver=HP LaserJet 1020
#
#[NP2]
#Name=Canon LBP6230dn
#IP=192.168.1.101
#Driver=Canon LBP6230dn
